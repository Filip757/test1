<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Central Menu</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #1a1a1a;
            --button-bg: #f8f8f8;
            --border-color: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--accent-color);
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .logo {
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 32px;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Styl przycisków */
        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--button-bg);
            color: var(--accent-color);
            text-decoration: none;
            padding: 20px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
            background: #f0f0f0;
        }

        /* Styl skrótu (np. EN, ES) */
        .lang-code {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 8px;
        }

        /* Styl flagi (obrazka) */
        .flag-img {
            width: 32px;
            height: auto;
            border-radius: 4px;
        }

        .footer {
            margin-top: 50px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #999;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full animate-fade-in">
        
        <!-- HEADER -->
        <div class="text-center mb-12">
            <h1 class="text-7xl font-header tracking-widest mb-4 text-white">LA CENTRAL</h1>
            <p class="text-gray-400 text-lg tracking-wider">Los mejores tacos y bowls</p>
            <p class="text-gray-500 text-sm mt-2">Elige tu idioma / Choose your language</p>
        </div>

        <!-- GRID DE IDIOMAS -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            
            <!-- ESPAÑOL -->
            <a href="menu.html?lang=es" class="hover-pulse group bg-gradient-to-br from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg">
                <img src="es.png" alt="Español" class="w-16 h-12 mx-auto mb-3 rounded group-hover:scale-110 transition">
                <div class="font-black text-xl">ESPAÑOL</div>
                <div class="text-xs text-red-100 mt-2">ES</div>
            </a>

            <!-- ENGLISH -->
            <a href="menu.html?lang=en" class="hover-pulse group bg-gradient-to-br from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg">
                <img src="brytania.png" alt="English" class="w-16 h-12 mx-auto mb-3 rounded group-hover:scale-110 transition">
                <div class="font-black text-xl">ENGLISH</div>
                <div class="text-xs text-blue-100 mt-2">EN</div>
            </a>

            <!-- POLSKI -->
            <a href="menu.html?lang=pl" class="hover-pulse group bg-gradient-to-br from-white to-gray-200 hover:from-gray-100 hover:to-gray-300 p-6 rounded-2xl text-center transition transform shadow-lg">
                <img src="polska.png" alt="Polski" class="w-16 h-12 mx-auto mb-3 rounded group-hover:scale-110 transition">
                <div class="font-black text-xl text-gray-900">POLSKI</div>
                <div class="text-xs text-gray-600 mt-2">PL</div>
            </a>

            <!-- DEUTSCH -->
            <a href="menu.html?lang=de" class="hover-pulse group bg-gradient-to-br from-yellow-500 to-amber-600 hover:from-yellow-600 hover:to-amber-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg">
                <img src="germany.svg" alt="Deutsch" class="w-16 h-12 mx-auto mb-3 rounded group-hover:scale-110 transition">
                <div class="font-black text-xl">DEUTSCH</div>
                <div class="text-xs text-yellow-100 mt-2">DE</div>
            </a>

            <!-- FRANÇAIS -->
            <a href="menu.html?lang=fr" class="hover-pulse group bg-gradient-to-br from-purple-500 to-indigo-600 hover:from-purple-600 hover:to-indigo-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg col-span-2">
                <img src="fr.png" alt="Français" class="w-16 h-12 mx-auto mb-3 rounded group-hover:scale-110 transition">
                <div class="font-black text-xl">FRANÇAIS</div>
                <div class="text-xs text-purple-100 mt-2">FR</div>
            </a>

        </div>

        <!-- FOOTER -->
        <div class="text-center text-gray-500 text-xs">
            <p class="mb-2">📍 Lajares, Fuerteventura</p>
            <p class="font-bold text-green-400">🕐 10:00 - 16:00</p>
            <p class="text-gray-600 text-xs mt-2">Lunes-Domingo / Mon-Sun</p>
            <p class="mt-4 text-gray-600">© 2024 La Central</p>
        </div>

    </div>

</body>
</html>
