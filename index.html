<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Central Menu</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #1a1a1a;
            --button-bg: #f8f8f8;
            --border-color: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--accent-color);
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .logo {
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 32px;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Styl przycisków */
        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--button-bg);
            color: var(--accent-color);
            text-decoration: none;
            padding: 20px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
            background: #f0f0f0;
        }

        /* Styl skrótu (np. EN, ES) */
        .lang-code {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 8px;
        }

        /* Styl flagi (obrazka) */
        .flag-img {
            width: 32px;
            height: auto;
            border-radius: 4px;
        }

        .footer {
            margin-top: 50px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #999;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

  <div class="container">
    <div class="logo">La Central</div>
    
    <div class="grid">
        <a href="javascript:void(0)" onclick="goToMenu('en')" class="btn" style="grid-column: span 2;">
            <span class="lang-code">EN</span>
            <img src="brytania.jpg" class="flag-img" alt="English">
        </a>

        <a href="javascript:void(0)" onclick="goToMenu('es')" class="btn">
            <span class="lang-code">ES</span>
            <img src="es.jpg" class="flag-img" alt="Español">
        </a>

        <a href="javascript:void(0)" onclick="goToMenu('pl')" class="btn">
            <span class="lang-code">PL</span>
            <img src="polska.jpg" class="flag-img" alt="Polski">
        </a>

        <a href="javascript:void(0)" onclick="goToMenu('de')" class="btn">
            <span class="lang-code">DE</span>
            <img src="germany.svg" class="flag-img" alt="Deutsch">
        </a>

        <a href="javascript:void(0)" onclick="goToMenu('fr')" class="btn">
            <span class="lang-code">FR</span>
            <img src="fr.jpg" class="flag-img" alt="Français">
        </a>
    </div>
<button id="changeLangBtn" onclick="goBack()"></button>
  <script>
    function goToMenu(lang) {
      window.location.href = "https://filip757.github.io/menu/menu.html?lang=" + lang;
    }
  </script>

</body>
    <div class="footer">Lajares • Fuerteventura</div>
</div>

</body>
</html>
